apiVersion: v1
kind: Secret
metadata:
  name: sgate-secrets
  namespace: sgate
type: Opaque
stringData:
  # 数据库密码
  db-password: "sgate_secure_password"
  
  # Redis密码
  redis-password: "redis_secure_password"
  
  # JWT认证密钥
  auth-secret: "your-super-secret-jwt-key-change-in-production"

---
apiVersion: v1
kind: Secret
metadata:
  name: sgate-tls
  namespace: sgate
type: kubernetes.io/tls
data:
  # 使用以下命令生成TLS证书：
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt -subj "/CN=sgate/O=sgate"
  # base64 -w 0 tls.crt > tls.crt.base64
  # base64 -w 0 tls.key > tls.key.base64
  tls.crt: |
    # 请替换为实际的base64编码证书
  tls.key: |
    # 请替换为实际的base64编码密钥
