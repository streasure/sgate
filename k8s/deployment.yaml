apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgate
  namespace: sgate
  labels:
    app: sgate
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sgate
  template:
    metadata:
      labels:
        app: sgate
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sgate
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sgate
          image: sgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: tcp
              containerPort: 8083
              protocol: TCP
            - name: udp
              containerPort: 8084
              protocol: UDP
            - name: websocket
              containerPort: 8085
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: ENV
              value: "production"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sgate-secrets
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sgate-secrets
                  key: redis-password
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sgate-secrets
                  key: auth-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: config
          configMap:
            name: sgate-config
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: sgate
  namespace: sgate
  labels:
    app: sgate
spec:
  type: ClusterIP
  selector:
    app: sgate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: tcp
      port: 8083
      targetPort: 8083
      protocol: TCP
    - name: udp
      port: 8084
      targetPort: 8084
      protocol: UDP
    - name: websocket
      port: 8085
      targetPort: 8085
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sgate
  namespace: sgate
  labels:
    app: sgate

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sgate
  namespace: sgate
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sgate.example.com
      secretName: sgate-tls
  rules:
    - host: sgate.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sgate
                port:
                  number: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sgate
  namespace: sgate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sgate
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sgate
  namespace: sgate
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: sgate
