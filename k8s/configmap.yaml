apiVersion: v1
kind: ConfigMap
metadata:
  name: sgate-config
  namespace: sgate
data:
  config.yaml: |
    # 服务端口
    port: 8080

    # 日志级别
    logLevel: info

    # 协议配置
    transports:
      - protocol: tcp
        port: 8083
        type: ""
      - protocol: udp
        port: 8084
        type: ""
      - protocol: tcp
        port: 8085
        type: websocket

    # 工作池配置
    workerPool:
      minWorkers: 100
      maxWorkers: 500
      queueSize: 100000
      queueSizeThreshold: 1000

    # 速率限制配置
    rateLimiter:
      rate: 100000
      burst: 200000
      window: 1s

    # 安全配置
    security:
      authSecret: "${AUTH_SECRET}"
      authRoutes:
        - "getConnections"
        - "broadcast"

    # 告警配置
    alerts:
      activeConnectionsThreshold: 10000
      failedMessagesThreshold: 100
      processingTimeThreshold: 1000
      redisErrorsThreshold: 10
      queueLengthThreshold: 10000

    # 连接超时配置
    connection:
      timeout: 5m
      checkInterval: 30s

    # 数据库配置
    database:
      host: postgres
      port: 5432
      user: sgate
      password: "${DB_PASSWORD}"
      name: sgate
      maxConnections: 100

    # Redis配置
    redis:
      host: redis
      port: 6379
      password: "${REDIS_PASSWORD}"
      db: 0
      maxRetries: 3

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sgate
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'sgate'
        static_configs:
          - targets: ['sgate:9090']
        metrics_path: /metrics
        scrape_interval: 5s

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
